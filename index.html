<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8b6f47">
  <meta name="description" content="Muayenehane muhasebe takibi">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SMM Pro">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <title>SMM Pro</title>

  <!-- Üst Başlık -->
  <header class="header">
    <div class="header-left">
      <span class="header-logo">₺</span>
      <span class="header-title">SMM Pro</span>
    </div>
    <div class="header-right">
      <span class="header-date" id="headerDate"></span>
      <span class="sync-indicator sync-status" id="syncIndicator">⏳ Bağlanıyor...</span>
    </div>
  </header>

  <!-- Ana İçerik -->
  <main id="app">
    <div class="loading">Yükleniyor...</div>
